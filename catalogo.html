<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catálogo de Productos | Ver todos los productos</title>
    <meta name="description" content="Explora nuestro catálogo completo de productos. Filtra por categoría y encuentra lo que buscas." />
        <!-- Preconnect: establece conexión con servicios externos ANTES de que se necesiten -->
    <link rel="preconnect" href="https://firestore.googleapis.com" />
    <link rel="preconnect" href="https://res.cloudinary.com" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script>
      (function () {
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = savedTheme || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <style>
      html[data-theme='dark'] { background-color: #121212; color: #f0f0f0; }
      html[data-theme='light'] { background-color: #ffffff; color: #1a1a1a; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/catalogo-entry.js"></script>
  </body>
</html>
