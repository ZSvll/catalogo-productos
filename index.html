<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Catálogo de productos en línea. Encuentra electrónica, ropa y más con envíos a todo el país." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Momazos Tipxt — Catálogo de Momazos" />
    <meta property="og:description" content="Encuentra los mejores memes al mejor precio." />
    <meta property="og:url" content="https://momazostipxt.netlify.app" />
    <title>Momazos Tixpt</title>
    <link rel="shortcut icon" href="public/favicon.ico" type="image/x-icon">
    <!-- Preconnect: establece conexión con servicios externos ANTES de que se necesiten -->
    <link rel="preconnect" href="https://firestore.googleapis.com" />
    <link rel="preconnect" href="https://res.cloudinary.com" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" /> 
    <!-- Preload del LCP: primera imagen del carrusel -->
    <link rel="preload" as="image" href="https://picsum.photos/1600/600?random=1" />
    <script>
      (function () {
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = savedTheme || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>

    <!-- CSS crítico inline: pinta el fondo correcto antes de que cargue el resto del CSS -->
    <style>
      html[data-theme='dark'] { background-color: #121212; color: #f0f0f0; }
      html[data-theme='light'] { background-color: #ffffff; color: #1a1a1a; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
