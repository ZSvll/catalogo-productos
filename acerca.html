<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acerca de Nosotros | Catálogo de Productos</title>
    <meta name="description" content="Conoce más sobre nuestra empresa, misión y valores." />
        <!-- Preconnect: establece conexión con servicios externos ANTES de que se necesiten -->
    <link rel="preconnect" href="https://firestore.googleapis.com" />
    <link rel="preconnect" href="https://res.cloudinary.com" /> 
    <script>
      (function () {
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', savedTheme || (prefersDark ? 'dark' : 'light'));
      })();
    </script>
    <style>
      html[data-theme='dark'] { background-color: #121212; color: #f0f0f0; }
      html[data-theme='light'] { background-color: #ffffff; color: #1a1a1a; }
    </style>

    <!-- Datos estructurados para SEO: identifica el sitio como una Organización ante buscadores -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Catálogo de Productos",
      "url": "https://tu-dominio.netlify.app",
      "description": "Tienda en línea de catálogo de productos con envíos a todo el país."
    }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/acerca-entry.js"></script>
  </body>
</html>
