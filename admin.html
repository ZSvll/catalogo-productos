<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel Admin | Catálogo de Productos</title>
    <meta name="robots" content="noindex, nofollow" />
    <script>
      (function () {
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', savedTheme || (prefersDark ? 'dark' : 'light'));
      })();
    </script>
    <style>
      html[data-theme='dark'] { background-color: #121212; color: #f0f0f0; }
      html[data-theme='light'] { background-color: #ffffff; color: #1a1a1a; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/admin-entry.js"></script>
  </body>
</html>
